<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Luna</title>
<meta name="description" content="Track your cycle, understand your body">
<meta name="theme-color" content="#120810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Luna">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/icon.png">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #120810; --bg1: #1c0d16; --bg2: #251120; --card: #1f0e1acc;
  --bdr: #c9748840; --rose: #e8a0b0; --roseDim: #c97488;
  --wine: #8c3652; --wineDark: #5c1f36; --blush: #f2c4cf;
  --mist: #d4a0ae88; --fertile: #9b7fa8; --fertileL: #cdb8d6; --cream: #fdf0f3;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: linear-gradient(160deg, var(--bg0) 0%, var(--bg1) 45%, var(--bg2) 80%, var(--bg0) 100%);
  min-height: 100vh; font-family: 'Cormorant Garamond', serif; color: var(--rose);
  overflow-x: hidden; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }
textarea { resize: none; font-family: 'Cormorant Garamond', serif; }
input { font-family: 'Cormorant Garamond', serif; }
button { font-family: 'Cormorant Garamond', serif; cursor: pointer; transition: all .2s; }
button:active { transform: scale(.96); }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.5) sepia(1) hue-rotate(300deg); }

/* Animations */
@keyframes petalPulse { 0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 14px #c9748888} 50%{opacity:.7;transform:scale(.94);box-shadow:0 0 28px #c97488cc} }
@keyframes bloomIn { from{opacity:0;transform:translateY(10px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes floatPetal { 0%{transform:translateY(0) rotate(0deg);opacity:.18} 50%{opacity:.09} 100%{transform:translateY(-130px) rotate(25deg);opacity:0} }
@keyframes shimmer { 0%,100%{opacity:.6} 50%{opacity:1} }

.pulse { animation: petalPulse 2.4s ease-in-out infinite; }
.bloom { animation: bloomIn .38s cubic-bezier(.2,.8,.4,1) both; }
.petal { position: fixed; border-radius: 60% 40% 60% 40%; pointer-events: none; animation: floatPetal linear infinite; }

/* Layout */
#app { max-width: 480px; margin: 0 auto; padding-bottom: 88px; position: relative; z-index: 1; }
.page { display: none; } .page.active { display: block; }

/* Cards */
.card {
  background: linear-gradient(145deg, var(--card), #25112099);
  border: 1px solid var(--bdr); border-radius: 20px;
  backdrop-filter: blur(6px);
}
.card-glow { box-shadow: 0 0 28px #8c365222, 0 0 56px #5c1f3618, inset 0 1px 0 #f2c4cf0d; }
.card-fertile { box-shadow: 0 0 22px #9b7fa833, inset 0 1px 0 #cdb8d60d; }

/* Buttons */
.btn-primary { background: linear-gradient(135deg, var(--roseDim), var(--wine)); color: var(--cream); font-weight: 600; border: none; box-shadow: 0 4px 18px #8c365244; }
.btn-ghost { background: transparent; border: 1px solid var(--bdr); color: var(--rose); }
.btn-soft { background: #8c365222; border: 1px solid #8c365244; color: var(--blush); }
.btn-round { border-radius: 20px; padding: 10px 22px; font-size: 15px; }
.btn-wide { width: 100%; padding: 13px; border-radius: 16px; font-size: 16px; }

/* Chips / Pills */
.chip { padding: 6px 13px; border-radius: 20px; font-size: 13px; border: 1px solid #8c365244; background: transparent; color: #e8a0b099; transition: all .2s; }
.chip.on { background: #8c365233; border-color: var(--wine); color: var(--blush); box-shadow: 0 0 8px #8c365222; }
.chip.fertile-chip { border-color: #9b7fa844; }
.chip.fertile-chip.on { background: #9b7fa822; border-color: var(--fertile); color: var(--fertileL); }
.chip.skin-chip { border-color: #c4845a44; }
.chip.skin-chip.on { background: #c4845a22; border-color: #c4845a; color: #f0c4a8; }

/* Labels */
.section-label { font-family: 'Playfair Display', serif; font-size: 10px; letter-spacing: 3px; color: var(--roseDim); text-transform: uppercase; margin-bottom: 8px; display: block; }
.muted { color: var(--mist); font-size: 13px; }

/* Flow buttons */
.flow-btn { padding: 7px 14px; border-radius: 20px; border-width: 2px; border-style: solid; background: transparent; font-size: 14px; font-weight: 600; transition: all .2s; }
.flow-btn.on { color: var(--cream) !important; box-shadow: 0 0 14px; }

/* Inputs */
.inp { width: 100%; padding: 11px 14px; border-radius: 14px; background: #25112099; border: 1px solid var(--bdr); color: var(--rose); font-size: 15px; outline: none; color-scheme: dark; }
.inp-num { width: 76px; padding: 8px 12px; border-radius: 12px; background: #25112099; border: 1px solid var(--bdr); color: var(--rose); font-size: 16px; outline: none; }

/* Nav */
#nav { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(0deg, #120810 62%, transparent);
  padding-top: 18px; z-index: 100; }
#nav-inner { max-width: 480px; margin: 0 auto; display: flex; justify-content: space-around; padding: 0 16px 14px; }
.nav-btn { background: transparent; border: 1px solid transparent; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 14px; border-radius: 16px; transition: all .22s; }
.nav-btn.active { background: #8c365220; border-color: #8c365240; box-shadow: 0 0 12px #8c365222; }
.nav-btn span.icon { font-size: 20px; }
.nav-btn span.lbl { font-family: 'Playfair Display', serif; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mist); }
.nav-btn.active span.lbl { color: var(--blush); }

/* Modal overlay */
.modal-overlay { position: fixed; inset: 0; background: #00000099; display: flex; align-items: center; justify-content: center; z-index: 1400; padding: 16px; }
.modal-box { padding: 28px 24px; max-width: 440px; width: 100%; max-height: 92vh; overflow-y: auto; box-shadow: 0 0 60px #8c365244; }

/* Toast */
#toast { position: fixed; top: 22px; left: 50%; transform: translateX(-50%); padding: 11px 22px; border-radius: 30px; z-index: 3000; font-size: 14px; box-shadow: 0 8px 28px #5c1f3688; white-space: nowrap; display: none; letter-spacing: .5px; }

/* Calendar grid */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 11px; font-size: 13px; position: relative; color: #e8a0b044; }
.cal-day.period { background: #8c365244; color: var(--blush); border: 1px solid #8c365277; }
.cal-day.fertile { background: #9b7fa822; color: var(--fertileL); border: 1px solid #9b7fa844; }
.cal-day.ovulation { background: #9b7fa855; color: #ecdeff; border: 1px solid var(--fertile); }
.cal-day.today { outline: 2px solid var(--roseDim); outline-offset: 2px; font-weight: 700; color: var(--blush); }
.cal-day.ovulation::after { content: '◆'; position: absolute; top: 1px; right: 2px; font-size: 7px; color: var(--fertileL); }

/* Chart bars */
.bar-wrap { display: flex; align-items: flex-end; gap: 6px; height: 60px; }
.bar { flex: 1; background: linear-gradient(180deg, var(--roseDim), var(--wine)); border-radius: 4px 4px 0 0; min-height: 4px; box-shadow: 0 0 6px #8c365244; }

/* History log entry */
.log-entry { padding: 8px 0; border-bottom: 1px solid #c9748818; }
.log-entry:last-child { border-bottom: none; }

/* Progress bar */
.prog-track { background: #251120; border-radius: 8px; height: 3px; margin-bottom: 18px; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--roseDim), var(--blush)); border-radius: 8px; transition: width .3s; box-shadow: 0 0 8px #c9748866; }

/* Day dots */
.day-dots { display: flex; justify-content: center; gap: 5px; margin-top: 14px; flex-wrap: wrap; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #c9748830; transition: background .2s; }
.dot.done { background: var(--roseDim); }
.dot.current { background: var(--blush); box-shadow: 0 0 5px var(--blush); }

/* Divider line */
.divider { width: 56px; height: 1px; background: linear-gradient(90deg, transparent, var(--roseDim), transparent); margin: 11px auto 0; }

/* Orbs */
.orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div style="padding:34px 24px 8px;text-align:center">
    <div class="section-label" style="letter-spacing:6px;margin-bottom:6px">Luna</div>

  <!-- CALENDAR TAB -->

<script>
// ── Data & constants ──────────────────────────────────────────────────────
const SK = 'luna_v4';
const FLOW = [{v:'spotting',l:'Spotting',e:'·',c:'#f2c4cf'},{v:'light',l:'Light',e:'◦',c:'#e8a0b0'},{v:'medium',l:'Medium',e:'●',c:'#c97488'},{v:'heavy',l:'Heavy',e:'◉',c:'#8c3652'},{v:'very_heavy',l:'Very Heavy',e:'⬤',c:'#5c1f36'}];
const SYMS = ['Cramps','Headache','Bloating','Mood swings','Fatigue','Back pain','Breast tenderness','Nausea','Spotting','Insomnia'];
const MOODS = ['😊 Good','😐 Okay','😔 Low','😤 Irritable','😰 Anxious','🥰 Happy','😴 Tired','🌟 Energised'];
const CERV = ['Dry','Sticky','Creamy','Watery','Egg white'];
const SKIN = [{v:'normal',l:'Normal',e:'✨'},{v:'dry',l:'Dry',e:'🌵'},{v:'very_dry',l:'Very Dry',e:'🏜️'},{v:'flaky',l:'Flaky',e:'🍂'},{v:'oily',l:'Oily',e:'💧'},{v:'acne',l:'Acne',e:'🔴'},{v:'sensitive',l:'Sensitive',e:'🌡️'}];

let data = {cycles:[],nextExpected:null,notifications:[]};
try { const s = localStorage.getItem(SK); if(s) data = JSON.parse(s); } catch(e){}

function save() { try { localStorage.setItem(SK, JSON.stringify(data)); } catch(e){} }

// ── Date helpers ──────────────────────────────────────────────────────────
function today() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function addDays(s,n) { const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function diffDays(a,b) { return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000); }
function fmtLong(s) { if(!s)return''; return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}); }
function fmtShort(s) { if(!s)return''; return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function avgCycleLen() { const cs=data.cycles; if(cs.length<2)return 28; const l=[]; for(let i=1;i<cs.length;i++){const d=diffDays(cs[i-1].startDate,cs[i].startDate);if(d>15&&d<50)l.push(d);} return l.length?Math.round(l.reduce((a,b)=>a+b,0)/l.length):28; }
function avgPeriodLen() { const l=data.cycles.filter(c=>c.endDate).map(c=>diffDays(c.startDate,c.endDate)+1); return l.length?Math.round(l.reduce((a,b)=>a+b,0)/l.length):5; }
function calcOv(start) { return addDays(start, avgCycleLen()-14); }
function fertWin(ov) { return {start:addDays(ov,-5),end:addDays(ov,1)}; }

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.display='block';
  el.style.background = type==='err' ? '#5c1f36' : 'linear-gradient(135deg,#1f0e1a,#251120)';
  el.style.border = `1px solid ${type==='err'?'#8c365288':'#c9748888'}`;
  el.style.color = '#f2c4cf';
  setTimeout(()=>el.style.display='none', 3000);
}

// ── Tab switching ─────────────────────────────────────────────────────────

    else { const fc=FLOW.find(x=>x.v===v); btn.style.background='transparent'; btn.style.color=fc.c; btn.style.boxShadow='none'; }
  });
}

function toggleChip(btn, key, val, id) {
  if(key==='mood'||key==='cervical'||key==='skin') {
    const same = currentEntry[key]===val;
    // deselect all chips of same key
    document.querySelectorAll(`.chip[data-key="${key}"]`).forEach(b=>b.classList.remove('on'));
    currentEntry[key] = same ? '' : val;
    if(!same) btn.classList.add('on');
  } else {
    if(currentEntry.symptoms.includes(val)) { currentEntry.symptoms=currentEntry.symptoms.filter(x=>x!==val); btn.classList.remove('on'); }
    else { currentEntry.symptoms.push(val); btn.classList.add('on'); }
  }
}

function endPeriod() {
  const i = data.cycles.length-1;
  if(i>=0 && data.cycles[i].ongoing) {
    data.cycles[i].ongoing=false; data.cycles[i].endDate=today();
    save(); renderHome(); toast('Period ended 🌙');
  }
}

function deleteCycle(id) {
  data.cycles = data.cycles.filter(c=>String(c.id)!==String(id));
  const last = data.cycles[data.cycles.length-1];
  data.nextExpected = last ? addDays(last.startDate, avgCycleLen()) : null;
  save(); renderHome(); toast('Deleted');
}

function pastNext() {
  const sd = document.getElementById('past-start')?.value;
  const ed = document.getElementById('past-end')?.value;
  const err = document.getElementById('past-err');
  if(!sd||!ed){err.textContent='Please fill in both dates.';err.style.display='block';return;}
  if(ed<sd){err.textContent='End date must be after start date.';err.style.display='block';return;}
  if(diffDays(sd,ed)>14){err.textContent='Max 14 days duration.';err.style.display='block';return;}
  if(sd>=today()){err.textContent='Start date must be in the past.';err.style.display='block';return;}
  if(data.cycles.find(c=>c.startDate===sd)){err.textContent='A cycle with that start date already exists.';err.style.display='block';return;}
  pastStart=sd; pastEnd=ed;
  const n=diffDays(sd,ed);
  pastLogs=Array.from({length:n+1},(_,i)=>({date:addDays(sd,i),flow:'',symptoms:[],mood:'',cervical:'',skin:'',notes:''}));
  pastIdx=0; pastStep='days'; renderPastModal();
}

    if(!currentEntry.flow){const e=document.getElementById('past-err2');e.textContent='Pick a flow level or tap Skip.';e.style.display='block';return;}
    pastLogs[pastIdx]={...pastLogs[pastIdx],...currentEntry};
  }
  if(pastIdx+1<pastLogs.length){ pastIdx++; renderPastModal(); }
  else {
    const days=pastLogs.filter(d=>d.flow);
    data.cycles.push({id:Date.now(),startDate:pastStart,endDate:pastEnd,ongoing:false,days,isPast:true});
    data.cycles.sort((a,b)=>a.startDate.localeCompare(b.startDate));
    const last=data.cycles[data.cycles.length-1];
    data.nextExpected=addDays(last.startDate,avgCycleLen());
    save(); closePastModal(); renderHome();
    toast(`Past cycle added (${fmtShort(pastStart)}) 🌸`);
  }
}

// ── Calendar ──────────────────────────────────────────────────────────────
let calYear = new Date().getFullYear(); let calMon = new Date().getMonth();

function calNav(dir) {

function renderCalendar() {
  const t=today(); const avgLen=avgCycleLen();
  const first=new Date(calYear,calMon,1); const last=new Date(calYear,calMon+1,0);
  document.getElementById('cal-month').textContent=first.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const pm={};
  data.cycles.forEach(c=>{
    const ov=calcOv(c.startDate); const fw=fertWin(ov);
    const end=c.endDate||(c.ongoing?t:addDays(c.startDate,4));
    for(let d=c.startDate;d<=end;d=addDays(d,1)) pm[d]='period';
    for(let d=fw.start;d<=fw.end;d=addDays(d,1)) if(!pm[d]) pm[d]='fertile';
    if(!pm[ov]) pm[ov]='ovulation';
  });

  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  for(let i=0;i<first.getDay();i++) { const e=document.createElement('div'); grid.appendChild(e); }
  for(let i=1;i<=last.getDate();i++) {
    const ds=`${calYear}-${pad(calMon+1)}-${pad(i)}`;
    const el=document.createElement('div');
    el.className='cal-day'+(pm[ds]?' '+pm[ds]:'')+(ds===t?' today':'');
    el.textContent=i;
    grid.appendChild(el);
  }
}

// ── Insights ──────────────────────────────────────────────────────────────
function renderInsights() {
  const cs=data.cycles; const el=document.getElementById('insights-content');
  if(!cs.length){el.innerHTML='<div style="text-align:center;padding:56px 24px;color:var(--mist);font-size:16px;font-style:italic;font-family:\'Cormorant Garamond\',serif">No data yet.<br>Start logging to see patterns.</div>';return;}
  const t=today(); const avgLen=avgCycleLen(); const avgPer=avgPeriodLen();
  const last=cs[cs.length-1]; const ov=calcOv(last.startDate); const fw=fertWin(ov); const dto=diffDays(t,ov);
  const sc={};cs.forEach(c=>c.days?.forEach(d=>d.symptoms?.forEach(s=>{sc[s]=(sc[s]||0)+1;})));
  const ts=Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const mc={};cs.forEach(c=>c.days?.forEach(d=>{if(d.mood)mc[d.mood]=(mc[d.mood]||0)+1;}));
  const tm=Object.entries(mc).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const skc={};cs.forEach(c=>c.days?.forEach(d=>{if(d.skin)skc[d.skin]=(skc[d.skin]||0)+1;}));
  const tsk=Object.entries(skc).sort((a,b)=>b[1]-a[1]);
  const cl=[];for(let i=1;i<cs.length;i++){const d=diffDays(cs[i-1].startDate,cs[i].startDate);if(d>15&&d<50)cl.push({l:fmtShort(cs[i].startDate),v:d});}
  const maxL=cl.length?Math.max(...cl.map(c=>c.v)):30;
  const totalLogs=cs.reduce((n,c)=>n+(c.days?.length||0),0);
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${[['🔄',`${avgLen}d`,'Avg Cycle'],['🌹',`${avgPer}d`,'Avg Period'],['📅',cs.length,'Total Cycles'],['✍️',totalLogs,'Flow Logs']].map(([ic,v,l])=>`
        <div class="card" style="padding:16px 12px;text-align:center">
          <div style="font-size:22px;margin-bottom:5px">${ic}</div>
          <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:300;color:var(--blush)">${v}</div>
          <div class="muted" style="margin-top:2px;font-size:11px">${l}</div>
        </div>`).join('')}
    </div>
    <div class="card card-fertile" style="padding:18px 20px;margin-bottom:12px;border:1px solid #9b7fa840">
      <div class="section-label" style="color:var(--fertileL);margin-bottom:10px">Ovulation & Fertility</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><div style="font-size:11px;color:var(--mist);margin-bottom:3px">Ovulation</div>
          <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--fertileL)">${fmtShort(ov)}</div>
          <div style="font-size:11px;color:var(--mist);margin-top:2px">${dto>0?`in ${dto}d`:dto===0?'Today':`${Math.abs(dto)}d ago`}</div></div>
        <div><div style="font-size:11px;color:var(--mist);margin-bottom:3px">Fertile Window</div>
          <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--fertileL)">${fmtShort(fw.start)} – ${fmtShort(fw.end)}</div>
          <div style="font-size:11px;color:var(--mist);margin-top:2px">6-day window</div></div>
      </div>
      <div style="margin-top:11px;padding:8px 12px;background:#9b7fa811;border-radius:11px;border:1px solid #9b7fa833;font-size:12px;color:var(--fertileL);line-height:1.6">💡 Estimated from avg cycle length. Cervical mucus logs improve accuracy.</div>
    </div>
    ${cl.length?`<div class="card" style="padding:18px 20px;margin-bottom:12px">
      <div class="section-label" style="margin-bottom:14px">Cycle Length History</div>
      <div class="bar-wrap">${cl.map(c=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"><div class="bar" style="width:100%;height:${(c.v/maxL)*52}px"></div><div style="font-size:8px;color:var(--mist);text-align:center;line-height:1.3">${c.l}</div></div>`).join('')}</div>
      <div style="display:flex;justify-content:space-between;margin-top:6px"><span style="font-size:11px;color:var(--mist)">Min: ${Math.min(...cl.map(c=>c.v))}d</span><span style="font-size:11px;color:var(--mist)">Max: ${Math.max(...cl.map(c=>c.v))}d</span></div>
    </div>`:''}
    ${ts.length?`<div class="card" style="padding:18px 20px;margin-bottom:12px">
      <div class="section-label" style="margin-bottom:12px">Most Common Symptoms</div>
      ${ts.map(([s,n])=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="flex:1;font-size:14px;color:var(--rose)">${s}</div><div style="width:${(n/ts[0][1])*100}px;height:5px;background:linear-gradient(90deg,var(--wine),var(--blush));border-radius:4px;min-width:4px"></div><div style="font-size:11px;color:var(--mist);width:14px;text-align:right">${n}</div></div>`).join('')}
    </div>`:''}
    ${tm.length?`<div class="card" style="padding:18px 20px;margin-bottom:12px">
      <div class="section-label" style="margin-bottom:10px">Mood Patterns</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${tm.map(([m,n])=>`<div style="padding:8px 13px;border-radius:20px;background:#8c365222;border:1px solid #8c365244;font-size:14px;color:var(--blush)">${m} <span style="font-size:11px;color:var(--mist)">×${n}</span></div>`).join('')}</div>
    </div>`:''}
    ${tsk.length?`<div class="card" style="padding:18px 20px">
      <div class="section-label" style="margin-bottom:10px">Skin Patterns</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${tsk.map(([sk,n])=>{const s=SKIN.find(x=>x.v===sk);return s?`<div style="padding:8px 13px;border-radius:20px;background:#c4845a22;border:1px solid #c4845a44;font-size:14px;color:#f0c4a8">${s.e} ${s.l} <span style="font-size:11px;color:var(--mist)">×${n}</span></div>`:''}).join('')}</div>
    </div>`:''}
  `;
}

// ── Log tab ───────────────────────────────────────────────────────────────
function initLogForm() {
  resetEntry();
  document.getElementById('log-date').value = today();
  document.getElementById('log-date').max = today();
  document.getElementById('log-form').innerHTML = entryFormHTML(currentEntry,'log');
}

function submitLog() {
  currentEntry.notes = getEntryNotes('log');
  if(!currentEntry.flow) return toast('Please select a flow level','err');
  const ld = document.getElementById('log-date').value;
  const cs = data.cycles;
  const ri = [...cs].reverse().findIndex(c=>c.startDate<=ld&&(!c.endDate||c.endDate>=ld));
  const idx = ri>=0 ? cs.length-1-ri : cs.length-1;
  if(idx<0) return toast('No cycle found for that date. Log a period start first.','err');
  cs[idx].days = cs[idx].days||[];
  const ei = cs[idx].days.findIndex(d=>d.date===ld);
  const entry={date:ld,...currentEntry};
  if(ei>=0) cs[idx].days[ei]=entry; else cs[idx].days.push(entry);
  save(); initLogForm(); toast('Log saved! ✓');
}

// ── Startup ───────────────────────────────────────────────────────────────
function init() {
  const t = today();
  if(data.nextExpected){
    const d=diffDays(t,data.nextExpected);
    if((d===0||d===-1)&&!data.notifications?.find(n=>n.date===t)) {
      data.notifications=data.notifications||[];
      data.notifications.push({date:t});
      save();
      setTimeout(openPeriodCheckNotif, 600);
    }
  }
  const lat=data.cycles[data.cycles.length-1];
  if(lat?.ongoing){
    const dn=diffDays(lat.startDate,t)+1;
    if(dn>=1&&dn<=10&&!lat.days?.find(d=>d.date===t)) setTimeout(openFlowNotif, 600);
  }
  renderHome();
  initLogForm();
}

// ── PWA Service Worker ────────────────────────────────────────────────────
(function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.matchAll({type:'window'}).then(cs => {
    if (cs.length) return cs[0].focus();
    return clients.openWindow('./');
  }));
});
self.addEventListener('message', e => {
  if (e.data?.type === 'SCHEDULE_NOTIF') {
    const { delay, title, body, tag } = e.data;
    setTimeout(() => {
      self.registration.showNotification(title, {
        body, tag, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="52" font-size="52">🌙</text></svg>',
        badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="52" font-size="52">🌙</text></svg>',
        vibrate: [200, 100, 200],
        requireInteraction: false
      });
    }, delay);
  }
});
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL, { type: 'classic' })
    .then(reg => { window._swReg = reg; updateNotifUI(); })
    .catch(() => {});
})();

// ── Notification helpers ──────────────────────────────────────────────────
function getNotifPrefs() {
  try { return JSON.parse(localStorage.getItem('luna_notif') || '{}'); } catch(e) { return {}; }
}
function saveNotifPrefs(prefs) {
  localStorage.setItem('luna_notif', JSON.stringify(prefs));
}

function updateNotifUI() {
  const btn = document.getElementById('notif-toggle-btn');
  const timeRow = document.getElementById('notif-time-row');
  const statusEl = document.getElementById('notif-status');
  if (!btn) return;
  const prefs = getNotifPrefs();
  const perm = ('Notification' in window) ? Notification.permission : 'unsupported';

  if (perm === 'unsupported') {
    btn.textContent = 'Not supported';
    btn.disabled = true;
    if (statusEl) statusEl.textContent = 'Your browser does not support notifications.';
    return;
  }
  if (perm === 'denied') {
    btn.textContent = 'Blocked';
    btn.style.opacity = '0.5';
    if (statusEl) statusEl.textContent = 'Notifications are blocked. Enable them in your browser settings.';
    return;
  }
  if (prefs.enabled && perm === 'granted') {
    btn.textContent = 'Disable';
    btn.style.background = '#8c365244';
    if (timeRow) timeRow.style.display = 'block';
    const ti = document.getElementById('notif-time');
    if (ti && prefs.time) ti.value = prefs.time;
    if (statusEl) statusEl.textContent = `Reminder set for ${prefs.time || '20:00'} each day 🌙`;
    scheduleNextNotif();
  } else {
    btn.textContent = 'Enable';
    btn.style.background = '';
    if (timeRow) timeRow.style.display = 'none';
    if (statusEl) statusEl.textContent = '';
  }
}

async function toggleNotifications() {
  const prefs = getNotifPrefs();
  if (prefs.enabled) {
    saveNotifPrefs({ ...prefs, enabled: false });
    updateNotifUI();
    toast('Reminders turned off');
    return;
  }
  if (!('Notification' in window)) { toast('Not supported on this browser', 'err'); return; }
  if (Notification.permission === 'denied') { toast('Notifications are blocked — check browser settings', 'err'); return; }
  const perm = Notification.permission === 'granted' ? 'granted' : await Notification.requestPermission();
  if (perm !== 'granted') { toast('Permission not granted', 'err'); updateNotifUI(); return; }
  saveNotifPrefs({ ...prefs, enabled: true, time: prefs.time || '20:00' });
  updateNotifUI();
  toast('Reminders enabled! 🌙');
}

function saveNotifTime() {
  const ti = document.getElementById('notif-time');
  if (!ti) return;
  const t = ti.value || '20:00';
  const prefs = getNotifPrefs();
  saveNotifPrefs({ ...prefs, time: t });
  updateNotifUI();
  toast(`Reminder set for ${t} 🌸`);
}

function scheduleNextNotif() {
  const prefs = getNotifPrefs();
  if (!prefs.enabled || Notification.permission !== 'granted') return;
  const [h, m] = (prefs.time || '20:00').split(':').map(Number);
  const now = new Date();
  const next = new Date();
  next.setHours(h, m, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  const delay = next - now;

  // Build message based on cycle state
  const cs = data.cycles; const cur = cs[cs.length - 1];
  let body = 'Add your logs for today 🌸';
  if (cur?.ongoing) {
    const dn = diffDays(cur.startDate, today()) + 1;
    body = `Day ${dn} — how's your flow today? Add your logs 🌸`;
  }

  if (window._swReg?.active) {
    window._swReg.active.postMessage({ type: 'SCHEDULE_NOTIF', delay, title: 'Luna 🌙', body, tag: 'luna-daily' });
  }
  // Fallback: browser setTimeout (only works if tab is open)
  if (!window._swReg) {
    clearTimeout(window._notifTimer);
    window._notifTimer = setTimeout(() => {
      if (Notification.permission === 'granted') new Notification('Luna 🌙', { body, icon: '' });
    }, delay);
  }
}

// ── Fire notification check on startup ───────────────────────────────────
window.addEventListener('load', () => { setTimeout(updateNotifUI, 800); });

init();
</script>
